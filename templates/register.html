{% extends 'base.html' %}
{% block content %}

<div class="login-wrapper">
    <div class="login-container register-container">
        <div class="text-center mb-4">
            <h2 class="login-title">Create Account</h2>
            <p class="login-subtitle">Join the Smart Object Detection platform</p>
        </div>
        
        <form method="post" action="/register" class="login-form">
            <div class="form-group mb-3">
                <label for="name" class="form-label">Full Name</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" id="name" name="name" class="form-control glass-input" placeholder="Enter your name" required>
                </div>
            </div>

            <div class="form-group mb-3">
                <label for="email" class="form-label">Email</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" class="form-control glass-input" placeholder="Enter your email" required>
                </div>
            </div>
            
            <div class="form-group mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" class="form-control glass-input pr-5" placeholder="Create a password" required>
                    <i class="fa-solid fa-eye-slash toggle-password" onclick="togglePasswordVisibility('password', this)" title="Show/Hide Password"></i>
                </div>
                <!-- Optional Password Strength Indicator -->
                <div class="password-strength mt-2 d-none" id="password-strength-container">
                    <div class="progress" style="height: 5px; border-radius: 5px; background: rgba(0,0,0,0.1);">
                        <div id="password-strength-bar" class="progress-bar bg-danger" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                    <small id="password-strength-text" class="text-muted" style="font-size: 0.75rem;">Password strength</small>
                </div>
            </div>

            <div class="form-group mb-4">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control glass-input pr-5" placeholder="Confirm your password" required>
                    <i class="fa-solid fa-eye-slash toggle-password" onclick="togglePasswordVisibility('confirm_password', this)" title="Show/Hide Password"></i>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary-gradient w-100 mb-3">Register</button>
            
            <div class="text-center mt-3">
                <span class="text-muted">Already have an account?</span> 
                <a href="/" class="accent-link">Login</a>
            </div>
        </form>
    </div>
</div>

<script>
    function togglePasswordVisibility(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        }
    }

    // Basic password strength checker animation (optional enhancement)
    const passwordInput = document.getElementById('password');
    const strengthContainer = document.getElementById('password-strength-container');
    const strengthBar = document.getElementById('password-strength-bar');
    const strengthText = document.getElementById('password-strength-text');

    passwordInput.addEventListener('input', function() {
        const val = this.value;
        if (val.length > 0) {
            strengthContainer.classList.remove('d-none');
            let strength = 0;
            if (val.length > 5) strength += 30;
            if (val.match(/[a-z]+/)) strength += 20;
            if (val.match(/[A-Z]+/)) strength += 20;
            if (val.match(/[0-9]+/)) strength += 15;
            if (val.match(/[$@#&!]+/)) strength += 15;
            
            strengthBar.style.width = strength + '%';
            
            if (strength < 40) {
                strengthBar.className = 'progress-bar bg-danger';
                strengthText.innerText = 'Weak';
                strengthText.style.color = '#ef4444';
            } else if (strength < 80) {
                strengthBar.className = 'progress-bar bg-warning';
                strengthText.innerText = 'Moderate';
                strengthText.style.color = '#f59e0b';
            } else {
                strengthBar.className = 'progress-bar bg-success';
                strengthText.innerText = 'Strong';
                strengthText.style.color = '#10b981';
            }
        } else {
            strengthContainer.classList.add('d-none');
        }
    });
</script>

{% endblock %}
