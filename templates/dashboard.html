
{% extends 'base.html' %}
{% block content %}

<div class="dashboard-container">
    <div class="welcome-section">
        <h1 class="welcome-title">Welcome, {{name|default('User')}}</h1>
        <p class="welcome-subtitle">Here is your AI Object Detection dashboard.</p>
    </div>

    <div class="row g-4 justify-content-center main-action-cards">
        
        <!-- Card 1: Start Detection -->
        <div class="col-12 col-md-4">
            <div class="action-card">
                <div class="card-icon-wrapper icon-camera">
                    <i class="fa-solid fa-camera"></i>
                </div>
                <h3 class="card-title">Start Detection</h3>
                <a href="/start_detection" class="btn btn-dashboard btn-start">Start Camera</a>
            </div>
        </div>

        <!-- Card 2: View Predictions -->
        <div class="col-12 col-md-4">
            <div class="action-card">
                <div class="card-icon-wrapper icon-chart">
                    <i class="fa-solid fa-chart-simple"></i>
                </div>
                <h3 class="card-title">View Predictions</h3>
                <a href="/view_predictions" class="btn btn-dashboard btn-table">Open Table</a>
            </div>
        </div>

        <!-- Card 3: Account -->
        <div class="col-12 col-md-4">
            <div class="action-card">
                <div class="card-icon-wrapper icon-account">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </div>
                <h3 class="card-title">Account</h3>
                <a href="/logout" class="btn btn-dashboard btn-logout">Logout</a>
            </div>
        </div>
        
    </div>
</div>

{% endblock %}
