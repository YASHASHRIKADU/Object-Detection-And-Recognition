
{% extends 'base.html' %}
{% block content %}

<h3 class="text-white mb-4">Detection History</h3>

<table class="table table-bordered table-striped bg-white">

<thead>
<tr>
<th>ID</th>
<th>Object</th>
<th>Confidence</th>
<th>Time</th>
</tr>
</thead>

<tbody>

{% for row in data %}
<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
</tr>
{% endfor %}

</tbody>

</table>

<a href="/dashboard" class="btn btn-light">Back</a>

{% endblock %}
